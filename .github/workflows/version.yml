name: Version check

on: [push, workflow_dispatch]

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check VERSION is one ahead of latest tag (or equal if on tag)
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0)
          CURRENT_VERSION=$(sed -n 's/^#define VERSION "\(.*\)"/\1/p' src/common.h)

          TAG_COMMIT=$(git rev-list -n1 "$LATEST_TAG")
          HEAD_COMMIT=$(git rev-parse HEAD)

          if [ "$TAG_COMMIT" = "$HEAD_COMMIT" ]; then
            EXPECTED="$LATEST_TAG"
          else
            MAJOR=$(echo "$LATEST_TAG" | cut -d. -f1 | tr -d v)
            MINOR=$(echo "$LATEST_TAG" | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)
            EXPECTED="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          if [ "$CURRENT_VERSION" != "$EXPECTED" ]; then
            echo "Error: VERSION in src/common.h is '$CURRENT_VERSION', expected '$EXPECTED' (latest tag: $LATEST_TAG)"
            exit 1
          fi

          echo "VERSION ok: $CURRENT_VERSION"
